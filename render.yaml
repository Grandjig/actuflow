# Render Blueprint - deploy backend to Render.com
# Usage: render deploy (from repo root)

services:
  - type: web
    name: actuflow-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AI_ENABLED
        value: "false"
