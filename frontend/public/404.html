<!DOCTYPE html>
<html>
 <head>
 <meta charset="utf-8">
 <title>ActuFlow</title>
 <script type="text/javascript">
 // GitHub Pages SPA redirect hack
 // When GitHub Pages serves a 404, this redirects to index.html with the path as a query param
 // The main app then reads this and navigates to the correct route
 var pathSegmentsToKeep = 1; // Keep 1 segment for /actuflow/

 var l = window.location;
 l.replace(
 l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
 l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
 l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
 (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
 l.hash
 );
 </script>
 </head>
 <body>
 </body>
</html>
