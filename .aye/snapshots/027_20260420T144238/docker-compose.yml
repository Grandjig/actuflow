version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: actuflow-db
    environment:
      POSTGRES_USER: actuflow
      POSTGRES_PASSWORD: actuflow_secret
      POSTGRES_DB: actuflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actuflow -d actuflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    container_name: actuflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: actuflow-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://actuflow:actuflow_secret@db:5432/actuflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
      DEBUG: "true"
      AI_ENABLED: "true"
      AI_SERVICE_URL: http://ai_service:8001
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: actuflow-celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://actuflow:actuflow_secret@db:5432/actuflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.worker worker --loglevel=info

  # AI Service
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: actuflow-ai
    environment:
      REDIS_URL: redis://redis:6379/1
      LLM_PROVIDER: local
      LOCAL_LLM_URL: http://ollama:11434
    ports:
      - "8001:8001"
    depends_on:
      - redis
    volumes:
      - ./ai_service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: actuflow-frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_AI_ENABLED: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  # Optional: Ollama for local LLM
  # ollama:
  #   image: ollama/ollama
  #   container_name: actuflow-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

volumes:
  postgres_data:
  redis_data:
  # ollama_data:
