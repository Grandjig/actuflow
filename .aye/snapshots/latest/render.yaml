# Render Blueprint for easy deployment
# https://render.com/docs/blueprint-spec

services:
 - type: web
 name: actuflow-api
 runtime: python
 rootDir: backend
 buildCommand: pip install -r requirements.txt && alembic upgrade head
 startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
 envVars:
 - key: DATABASE_URL
 fromDatabase:
 name: actuflow-db
 property: connectionString
 - key: REDIS_URL
 fromService:
 type: redis
 name: actuflow-redis
 property: connectionString
 - key: SECRET_KEY
 generateValue: true
 - key: DEBUG
 value: false
 - key: ALLOWED_ORIGINS
 sync: false # Set manually to your GitHub Pages URL
 - key: AI_ENABLED
 value: false # Disable AI for free tier
 healthCheckPath: /health
 plan: free

 - type: worker
 name: actuflow-worker
 runtime: python
 rootDir: calculation_engine
 buildCommand: pip install -r requirements.txt
 startCommand: celery -A celery_app worker --loglevel=info
 envVars:
 - key: DATABASE_URL
 fromDatabase:
 name: actuflow-db
 property: connectionString
 - key: REDIS_URL
 fromService:
 type: redis
 name: actuflow-redis
 property: connectionString
 plan: free

databases:
 - name: actuflow-db
 plan: free

# Note: For Redis, use Upstash (external) for free tier
# Render's Redis requires paid plan
