version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: actuflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-actuflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-actuflow_dev}
      POSTGRES_DB: ${POSTGRES_DB:-actuflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-actuflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: actuflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: actuflow-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-actuflow}:${POSTGRES_PASSWORD:-actuflow_dev}@postgres:5432/${POSTGRES_DB:-actuflow}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: actuflow-frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
