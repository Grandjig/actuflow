apiVersion: apps/v1
kind: Deployment
metadata:
  name: actuflow-calculation-engine
  namespace: actuflow
  labels:
    app: actuflow
    component: calculation-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: actuflow
      component: calculation-engine
  template:
    metadata:
      labels:
        app: actuflow
        component: calculation-engine
    spec:
      containers:
        - name: worker
          image: ${DOCKER_REGISTRY}/actuflow-calculation-engine:${IMAGE_TAG}
          command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: actuflow-config
            - secretRef:
                name: actuflow-secrets
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - celery_app
                - inspect
                - ping
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actuflow-celery-beat
  namespace: actuflow
  labels:
    app: actuflow
    component: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actuflow
      component: celery-beat
  template:
    metadata:
      labels:
        app: actuflow
        component: celery-beat
    spec:
      containers:
        - name: beat
          image: ${DOCKER_REGISTRY}/actuflow-calculation-engine:${IMAGE_TAG}
          command: ["celery", "-A", "celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: actuflow-config
            - secretRef:
                name: actuflow-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
