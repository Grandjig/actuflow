apiVersion: apps/v1
kind: Deployment
metadata:
  name: actuflow-frontend
  namespace: actuflow
  labels:
    app: actuflow
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: actuflow
      component: frontend
  template:
    metadata:
      labels:
        app: actuflow
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ${DOCKER_REGISTRY}/actuflow-frontend:${IMAGE_TAG}
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: actuflow
spec:
  selector:
    app: actuflow
    component: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
